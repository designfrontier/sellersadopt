# Build the Astro site in `site/` and publish it to GitHub Pages.
#
# Trigger: pushes to `main` that touch `site/**` or this workflow file, plus
# manual `workflow_dispatch` for redeploys without a code change.
#
# The site is served at the apex custom domain `sellersadopt.com`. The custom
# domain is configured via:
#   - `site/public/CNAME` (Astro copies this verbatim into `dist/` at build time;
#     GitHub Pages reads it from the deployed artifact and binds the domain)
#   - Cloudflare DNS A-records on `sellersadopt.com` pointing the apex at
#     GitHub Pages' anycast IPs (185.199.108.153 / .109.153 / .110.153 / .111.153)
# Neither piece of DNS plumbing lives in this workflow.
#
# Required repo settings (one-time, in the GitHub UI):
#   - Settings -> Pages -> Build and deployment -> Source = "GitHub Actions"
#   - Settings -> Pages -> Custom domain = sellersadopt.com (auto-populates from
#     the CNAME file once the first deploy lands)
# No secrets are required; the deploy uses the workflow's OIDC token (hence
# `id-token: write`).

name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deploy. Do NOT cancel an in-progress deploy:
# Pages deployments are finalized server-side, and cancelling mid-flight can
# leave the environment in a weird state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
