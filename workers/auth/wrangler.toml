name = "sellers-auth"
main = "src/index.ts"
# NB: ideally this would be a date within the last two months (~2026-03-10),
# but the wrangler version pinned in package.json (3.x) ships a workerd whose
# newest supported compatibility date is 2024-12-30. Bump this when we upgrade
# wrangler to a 4.x line that ships a newer workerd.
compatibility_date = "2024-12-30"

# ---------------------------------------------------------------------------
# Required runtime configuration
#
# Secrets (set via `wrangler secret put <NAME>` in production, or `.dev.vars`
# in local dev — see README.md):
#   GITHUB_CLIENT_ID     – the GitHub OAuth App's client ID
#   GITHUB_CLIENT_SECRET – the GitHub OAuth App's client secret
#
# Plain vars (configured below or in the Cloudflare dashboard):
#   ALLOWED_GITHUB_USERS – comma-separated list of GitHub usernames that are
#                          allowed to log in to Sveltia/Decap. Compared
#                          case-insensitively after trimming whitespace.
# ---------------------------------------------------------------------------

[vars]
ALLOWED_GITHUB_USERS = ""
