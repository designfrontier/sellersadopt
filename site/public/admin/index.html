<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sellers Adopt — Admin</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <!--
      Sveltia CMS loader.

      Pinned to a specific version (rather than `@latest`) so the admin UI is
      reproducible and a surprise upstream release can't break editing for
      Daniel & Katie. Bump deliberately.

      Sveltia ships an ES module (`./dist/sveltia-cms.mjs`); the package's
      `main`/`module`/`exports` all point at the .mjs file, so `type="module"`
      is required. The `.js` URL on unpkg redirects to the `.mjs`. We use the
      explicit `.mjs` to avoid the redirect.

      Why Sveltia over Decap: Sveltia is config-compatible with Decap CMS,
      ships first-class Cloudflare R2 media library support (Decap does not),
      and is actively maintained. See `./README.md`.
    -->
    <script
      type="module"
      src="https://unpkg.com/@sveltia/cms@0.157.1/dist/sveltia-cms.mjs"
    ></script>
  </body>
</html>
