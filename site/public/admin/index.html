    <!--
      Sveltia CMS loader. Pinned to a specific version so the admin UI is
      reproducible — bump deliberately.

      Use the UMD bundle (`sveltia-cms.js`), not the ES module (`.mjs`). Only
      the UMD build auto-bootstraps: it fetches `config.yml` from this
      directory and mounts the app. Loading the `.mjs` with `type="module"`
      results in a silent white screen (no config fetch, no error).
    -->
    <script src="https://unpkg.com/@sveltia/cms@0.158.1/dist/sveltia-cms.js"></script>
  </body>
