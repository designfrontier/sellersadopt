# Sveltia CMS configuration.
#
# Schema reference: https://sveltiacms.app/en/docs
# Sveltia is config-compatible with Decap CMS, so Decap docs also apply:
# https://decapcms.org/docs/configuration-options/
#
# Field shapes here must mirror site/src/content.config.ts. If you change one,
# change the other.
#
# Known exception: the markdown body. In Astro, body is implicit (everything
# after the frontmatter); in Sveltia/Decap, you declare it as a `widget: markdown`
# field — conventionally named `body`. There is no matching Zod field for it,
# and that's correct.

backend:
  name: github
  # Update if repo is renamed or transferred.
  repo: designfrontier/adoption
  branch: main
  # OAuth handshake is performed by the auth Worker (see workers/auth/).
  # Sveltia/Decap appends `/auth` to base_url when opening the popup, which
  # matches the Worker's route, so no `auth_endpoint` override is needed.
  base_url: https://auth.sellersadopt.com

# Direct commits to `main`. Editorial workflow (PR-based review) can be
# enabled later by switching to `editorial_workflow`.
publish_mode: simple

# Site URLs surfaced inside the CMS UI (preview links, header logo).
site_url: https://sellersadopt.com
display_url: https://sellersadopt.com
logo_url: /favicon.svg

# ---------------------------------------------------------------------------
# Media handling — in-repo, per-field.
#
# Each image-widget field below sets its own `media_folder` and `public_folder`
# to `images`, which (per Decap/Sveltia rules) is interpreted RELATIVE TO THE
# ENTRY'S COLLECTION FOLDER. A photo uploaded for a gallery entry at
# `site/src/content/gallery/foo.md` is committed to
# `site/src/content/gallery/images/<filename>`, and Sveltia writes
# `image: images/<filename>` into the frontmatter — a path relative to the
# markdown file, which Astro's `image()` schema helper resolves at build time.
#
# This replaces the earlier R2-backed flow (Path A). Images now live in git
# alongside the markdown that references them. Trade-off: the repo grows with
# image binaries, so editors should compress photos before upload (target
# < ~5 MB per image, ideally under 1 MB).
#
# The top-level `media_folder` / `public_folder` below are a fallback for any
# media inserted via the markdown widget (not via an image-widget field). They
# point at `site/public/uploads/` so anything that lands there is served as a
# normal static asset at `/uploads/...`.
# ---------------------------------------------------------------------------

media_folder: site/public/uploads
public_folder: /uploads

collections:
  - name: pages
    label: Marketing pages
    folder: site/src/content/pages
    create: true
    slug: '{{slug}}'
    fields:
      - { name: title, label: Title, widget: string }
      - {
          name: order,
          label: Order,
          widget: number,
          default: 100,
          value_type: int,
          step: 1,
        }
      - { name: summary, label: Summary, widget: text, required: false }
      - {
          name: hero,
          label: Hero image,
          widget: image,
          required: false,
          media_folder: images,
          public_folder: images,
        }
      - { name: body, label: Body, widget: markdown }

  - name: family
    label: Family members
    folder: site/src/content/family
    create: true
    slug: '{{slug}}'
    fields:
      - { name: name, label: Name, widget: string }
      - name: role
        label: Role
        widget: select
        options: [parent, child, pet]
      - {
          name: age,
          label: Age,
          widget: number,
          required: false,
          value_type: int,
          step: 1,
        }
      - {
          name: traits,
          label: Traits,
          widget: string,
          hint: "One-line description (e.g., 'Mom, music teacher')",
        }
      - {
          name: photo,
          label: Photo,
          widget: image,
          required: false,
          media_folder: images,
          public_folder: images,
        }
      - { name: order, label: Order, widget: number, value_type: int, step: 1 }
      - { name: body, label: Bio, widget: markdown }

  - name: gallery
    label: Photo gallery
    folder: site/src/content/gallery
    create: true
    slug: '{{slug}}'
    fields:
      - { name: title, label: Title, widget: string }
      - {
          name: image,
          label: Image,
          widget: image,
          media_folder: images,
          public_folder: images,
        }
      - {
          name: alt,
          label: Alt text,
          widget: string,
          hint: Required for accessibility,
        }
      - { name: caption, label: Caption, widget: text, required: false }
      - {
          name: takenAt,
          label: Taken at,
          widget: datetime,
          required: false,
          format: yyyy-MM-dd,
        }
      - name: season
        label: Season
        widget: select
        required: false
        options: [spring, summer, fall, winter]

  - name: blog
    label: Blog / journal
    folder: site/src/content/blog
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime }
      - { name: summary, label: Summary, widget: text, required: false }
      - {
          name: hero,
          label: Hero image,
          widget: image,
          required: false,
          media_folder: images,
          public_folder: images,
        }
      - { name: body, label: Body, widget: markdown }
